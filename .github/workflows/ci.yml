name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run ruff
        run: python -m ruff check .

      - name: Run pytest
        run: python -m pytest

      - name: Build sample packet
        run: python -m dental_packet build --input ./examples/sample_input --output ./case_packet_output

      - name: Validate sample packet
        run: python -m dental_packet validate --input ./case_packet_output/case_packet.json
